<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MK Magnolia{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdf6f0; }
        .navbar-brand { font-weight: bold; color: #a0286e !important; }
        .btn-magnolia { background-color: #a0286e; border-color: #a0286e; color: #fff; }
        .btn-magnolia:hover { background-color: #82205a; border-color: #82205a; color: #fff; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .badge-species { background-color: #e8a0c8; color: #4a0030; }
        .badge-blooming { background-color: #a0286e; color: #fff; }
        footer { color: #888; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'magnolias:list' %}">🌸 MK Magnolia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'magnolias:list' %}">All Sightings</a></li>
                <li class="nav-item"><a class="nav-link btn btn-magnolia ms-2 px-3" href="{% url 'magnolias:create' %}">+ Log Magnolia</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

<footer class="text-center py-4 mt-auto">
    <small>MK Magnolia &mdash; Tracking magnolias in Milton Keynes</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
