{% extends "magnolias/base.html" %}
{% block title %}Delete Magnolia | MK Magnolia{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h1 class="h4 mb-0">Confirm Delete</h1>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this magnolia sighting?</p>
                <p class="fw-semibold">{{ magnolia }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">Yes, delete</button>
                        <a href="{{ magnolia.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
